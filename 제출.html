<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">>
        <title>나의 일정</title>

        <style>
            *{
                margin: 0;
                padding: 0;     
                box-sizing:border-box;            
            }

            body{
                width:700px;
                margin:30px auto;
                font-family:"맑은 고딕", sans-serif;
            }
           h2{
            margin-bottom:20px;
           }
             .month{
                text-align:right;
                margin-bottom:10px;
                font-size:20px;
                font-weight:bold;
             }

             table{
                width:100%;
                border-collapse:collapse;
                table-layout:fixed;
             }

             th.td{
                border:1px solid #ccc;
             }

            td{
                height:100px;
                vertical-align:top;
                padding:5px;
            }

            th{
                height:20px;
                background-color:#f8f9f2;
                text-align:center;
                font-weight:bold;
            }

            th:first-child{
                color:red;
            }
            th:last-child{
                color:blue;
            }
            </style>
            </head>

            <body>

                <h2>나의 일정</h2>

                <div class="month">2026년 6월</div>

                <table>
                    <tr>
                        <th>일</th>
                        <th>월</th>
                        <th>화</th>
                        <th>수</th>
                        <th>목</th>
                        <th>금</th>
                        <th>토</th>     
                    </tr>
                    <tr>
                        <td></td>
                        <td></td>
                        <td>1</td>
                        <td>2</td>
                        <td>3</td>
                        <td>4</td>
                        <td>5</td>  
                    </tr>
                    <tr>
                        <td>6</td>
                        <td>7</td>
                        <td>8</td>
                        <td>9</td>
                        <td>10</td>
                        <td>11</td>
                        <td>12</td>
                    </tr>
                    <tr>
                        <td>13</td>
                        <td>14</td>
                        <td>15</td>
                        <td>16</td>
                        <td>17</td>
                        <td>18<br>기말고사</td>
                        <td>19<br>기말고사</td>
                    </tr>
                    <tr>
                        <td>20<br>기말고사</td>
                        <td>21<br>기말고사</td>
                        <td>22<br>기말고사</td>
                        <td>23</td>
                        <td>24</td>
                        <td>25</td>
                        <td>26</td>
                    </tr>
                    <tr>
                        <td>27</td>
                        <td>28</td>
                        <td>29</td>
                        <td>30</td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </table>

            </body>
            </html>
