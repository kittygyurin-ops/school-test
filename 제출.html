<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>나의 일정</title>

        <style>
            *{
                margin: 0;
                padding: 0;     
                box-sizing:border-box;            
            }

            body{
                width:700px;
                margin:30px auto;
                font-family:"맑은 고딕", sans-serif;
            }
           h2{
            margin-bottom:20px;
           }
             .month{
                text-align:right;
                margin-bottom:10px;
                font-size:20px;
                font-weight:bold;
             }

             table{
                width:100%;
                border-collapse:collapse;
                table-layout:fixed;
             }

             th.td{
                border:1px solid #ccc;
             }

            td{
                height:100px;
                vertical-align:top;
                padding:5px;
            }

            th{
                height:20px;
                background-color:#f8f9f2;
                text-align:center;
                font-weight:bold;
            }

              .t{
                color:red;
            }
            .d{
                color:blue;
            }
            </style>
            </head>

            <body>

                <h2>나의 일정</h2>

                <div class="month">2026년 6월</div>

                <table>
                    <tr>
                        <th><span class="t">일</span></th>
                        <th>월</th>
                        <th>화</th>
                        <th>수</th>
                        <th>목</th>
                        <th>금</th>
                        <th>토</th>

                        <td>9</td>

                        <td>16</td>
                        <td>17</td>

                        <td>19<br>기말고사</td>
                        <td><span class="d">20</span><br>기말고사</td>
                        
                    </tr>
                    <tr>
                       <td><span class="t">21</span></td>

                        <td>24</td>

                        <td>26</td>

                        <td><span class="t">28</span></td>

                        <td>30</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>

                </table>

                    <tr>
                        <th><span class="t">일</span></th>

            </body>
            </html>
